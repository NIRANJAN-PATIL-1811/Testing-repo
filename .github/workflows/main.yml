name: Sample-test

on:
  push:
    branches:
      - main
jobs:
  Sample-test-jobs:
    runs-on: ubuntu-latest
    steps:
        - name: Install repo to vm
          uses: actions/checkout@v4

        - name: Installs nodejs
          uses: actions/setup-node@v4
          with:
            node-version: '18'

        - name: Install dependencies
          run: npm install

        - name: Run build command
          run: npm run build

        - name: Run test command
          run: npm test
