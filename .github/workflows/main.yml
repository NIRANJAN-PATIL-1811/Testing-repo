name: Sample-test

on:
  push:
    branches:
      - main

jobs:
  Sample-test-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd front-end
          npm install

      - name: Run build command
        run: |
          cd front-end
          npm run build

      - name: Run test command
        run: |
          cd front-end
          npm test
